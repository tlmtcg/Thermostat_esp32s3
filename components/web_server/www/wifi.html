<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Configuration WiFi</title>
    <link rel="stylesheet" href="common.css" />

    <style>
      /* Onglets */
      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .tab-btn {
        padding: 10px 18px;
        border-radius: 10px;
        border: none;
        background: #333;
        color: white;
        cursor: pointer;
        font-weight: 600;
      }

      .tab-btn.active {
        background: #ff8800;
      }

      /* Entrées WiFi */
      .wifi-entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        margin-top: 8px;
        border-radius: 12px;
        background: #222;
        cursor: pointer;
        transition: 0.2s;
      }

      .wifi-entry:hover {
        transform: scale(1.02);
      }

      .wifi-left {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
      }

      .rssi {
        font-size: 0.85rem;
        opacity: 0.85;
      }

      #wifi-status,
      #save-status {
        margin-top: 15px;
        font-weight: bold;
      }

      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 3px solid #999;
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 999;
        justify-content: center;
        align-items: center;
      }

      .modal.show {
        display: flex;
      }

      .modal-box {
        background: #1f1f1f;
        padding: 24px;
        border-radius: 18px;
        width: 330px;
        max-width: 90%;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      }

      .config-input {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        border-radius: 8px;
        border: none;
      }

      .signal-good {
        color: #00cc66;
      }
      .signal-mid {
        color: orange;
      }
      .signal-bad {
        color: #ff5555;
      }
    </style>
  </head>

  <body>
    <div id="navbar"></div>

    <h1 class="page-title">WiFi</h1>

    <!-- Onglets -->
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('statusTab')">
        État WiFi
      </button>
      <button class="tab-btn" onclick="showTab('configTab')">
        Configuration
      </button>
    </div>

    <!-- ============================
         ONGLET : ÉTAT WIFI
         ============================ -->
    <div id="statusTab">
      <div class="box">
        <h2>Station (Lien Box)</h2>

        <div class="line">
          <span class="label">Adresse IP</span>
          <span id="ip_sta" class="value ok">--</span>
        </div>

        <div class="line">
          <span class="label">Signal</span>
          <span id="rssi_val" class="value">--</span>
        </div>

        <div class="line">
          <span class="label">Qualité</span>
          <span id="quality" class="value">--</span>
        </div>

        <div class="line">
          <span class="label">Canal</span>
          <span id="chan" class="value">--</span>
        </div>
      </div>

      <div class="box">
        <h2>Point d'accès local</h2>

        <div class="line">
          <span class="label">SSID diffusé</span>
          <span id="ap_ssid_val" class="value">--</span>
        </div>

        <div class="line">
          <span class="label">IP passerelle</span>
          <span id="ip_ap" class="value">--</span>
        </div>

        <div class="line">
          <span class="label">Clients connectés</span>
          <span id="clients_count" class="value">0</span>
        </div>
      </div>

      <div class="box">
        <h2>Infos liaison</h2>

        <div class="line">
          <span class="label">Adresse MAC</span>
          <span id="mac" class="value">--</span>
        </div>

        <div class="line">
          <span class="label">Sécurité</span>
          <span id="auth" class="value">--</span>
        </div>
      </div>

      <div class="box">
        <h2>Réseaux détectés</h2>

        <button class="btn-save" onclick="scanWifi()">
          Scanner les réseaux
        </button>

        <div id="scan-results"></div>

        <div id="wifi-status"></div>
      </div>
    </div>

    <!-- ============================
         ONGLET : CONFIGURATION WIFI
         ============================ -->
    <div id="configTab" style="display: none">
      <div class="box">
        <h2>Configuration WiFi</h2>

        <label>SSID Station</label>
        <input id="cfg_sta_ssid" class="config-input" />

        <label>Mot de passe Station</label>
        <input id="cfg_sta_pass" class="config-input" type="password" />

        <label>SSID Point d'accès</label>
        <input id="cfg_ap_ssid" class="config-input" />

        <label>Mot de passe AP</label>
        <input id="cfg_ap_pass" class="config-input" type="password" />

        <label>Canal AP</label>
        <input
          id="cfg_ap_channel"
          class="config-input"
          type="number"
          min="1"
          max="13"
        />

        <label>Nombre de tentatives STA</label>
        <input
          id="cfg_retry_count"
          class="config-input"
          type="number"
          min="1"
          max="20"
        />

        <label>Intervalle retry (ms)</label>
        <input
          id="cfg_retry_interval"
          class="config-input"
          type="number"
          min="500"
          max="10000"
        />

        <label>Mode Auth minimal</label>
        <select id="cfg_auth_mode" class="config-input">
          <option value="0">OPEN</option>
          <option value="2">WPA_PSK</option>
          <option value="3">WPA2_PSK</option>
          <option value="4">WPA_WPA2_PSK</option>
          <option value="5">WPA3_PSK</option>
          <option value="6">WPA2_WPA3_PSK</option>
        </select>

        <button class="btn-save" onclick="saveWifiConfig()">Sauvegarder</button>

        <div id="save-status"></div>
      </div>
    </div>

    <!-- ============================
         MODAL CONNEXION
         ============================ -->
    <div id="wifiModal" class="modal">
      <div class="modal-box">
        <h3>Connexion WiFi</h3>

        <div class="line">
          <span class="label">Réseau</span>
          <span id="selectedSsid" class="value"></span>
        </div>

        <input id="wifiPassword" type="password" placeholder="Mot de passe" />

        <label class="showpass">
          <input type="checkbox" onchange="togglePassword(this)" />
          Afficher le mot de passe
        </label>

        <div class="modal-buttons">
          <button class="btn-save" onclick="sendWifiConnect()">
            Connecter
          </button>
          <button class="btn-cancel" onclick="closeWifiModal()">Annuler</button>
        </div>
      </div>
    </div>

    <!-- ============================
         JAVASCRIPT
         ============================ -->
    <script>
      /* Onglets */
      function showTab(tabId) {
        document.getElementById("statusTab").style.display = "none";
        document.getElementById("configTab").style.display = "none";

        document.getElementById(tabId).style.display = "block";

        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");
      }

      /* Chargement config */
      function loadWifiConfig() {
        fetch("/api/wifi/config")
          .then((r) => r.json())
          .then((cfg) => {
            cfg_sta_ssid.value = cfg.sta_ssid;
            cfg_sta_pass.value = cfg.sta_pass;
            cfg_ap_ssid.value = cfg.ap_ssid;
            cfg_ap_pass.value = cfg.ap_pass;
            cfg_ap_channel.value = cfg.ap_channel;
            cfg_retry_count.value = cfg.retry_count;
            cfg_retry_interval.value = cfg.retry_interval_ms;
            document.getElementById("cfg_auth_mode").value = cfg.auth_mode;

            ap_ssid_val.innerText = cfg.ap_ssid;
          });
      }

      function saveWifiConfig() {
        const payload = {
          sta_ssid: cfg_sta_ssid.value,
          sta_pass: cfg_sta_pass.value,
          ap_ssid: cfg_ap_ssid.value,
          ap_pass: cfg_ap_pass.value,
          ap_channel: Number(cfg_ap_channel.value),
          retry_count: Number(cfg_retry_count.value),
          retry_interval_ms: Number(cfg_retry_interval.value),
          auth_mode: Number(document.getElementById("cfg_auth_mode").value),
        };

        document.getElementById("save-status").innerHTML =
          '<span class="spinner"></span> Sauvegarde...';

        fetch("/api/wifi", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        })
          .then((r) => r.json())
          .then((d) => {
            document.getElementById("save-status").innerText =
              d.message || "OK";
            setTimeout(loadWifiConfig, 1500);
          })
          .catch(() => {
            document.getElementById("save-status").innerText =
              "Erreur sauvegarde";
          });
      }

      /* Scan WiFi */
      function signalClass(rssi) {
        if (rssi > -65) return "signal-good";
        if (rssi > -80) return "signal-mid";
        return "signal-bad";
      }

      function scanWifi() {
        const res = document.getElementById("scan-results");

        res.innerHTML =
          '<div><span class="spinner"></span>Scan en cours...</div>';

        fetch("/api/wifi/scan")
          .then((r) => r.json())
          .then((networks) => {
            res.innerHTML = networks
              .map(
                (n) => `
<div class="wifi-entry"
onclick="openWifiModal('${n.ssid.replace(/'/g, "\\'")}')">

<div class="wifi-left">
<span>${n.auth ? "🔒" : ""}</span>
<span>${n.ssid}</span>
</div>

<div class="rssi ${signalClass(n.rssi)}">
${n.rssi} dBm (Ch.${n.chan})
</div>

</div>
`,
              )
              .join("");
          })
          .catch(() => {
            res.innerHTML = "Erreur scan";
          });
      }

      /* Modal connexion */
      let selectedSSID = "";

      function openWifiModal(ssid) {
        selectedSSID = ssid;
        selectedSsid.innerText = ssid;
        wifiPassword.value = "";
        wifiModal.classList.add("show");
      }

      function closeWifiModal() {
        wifiModal.classList.remove("show");
      }

      function togglePassword(box) {
        wifiPassword.type = box.checked ? "text" : "password";
      }

      async function sendWifiConnect() {
        const password = wifiPassword.value;

        closeWifiModal();

        document.getElementById("wifi-status").innerHTML =
          `<span class="spinner"></span> Connexion à ${selectedSSID}...`;

        try {
          let r = await fetch("/api/wifi/connect", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              ssid: selectedSSID,
              password: password,
            }),
          });

          let data = await r.json();

          document.getElementById("wifi-status").innerHTML = data.message;

          setTimeout(updateWifi, 5000);
        } catch (e) {
          document.getElementById("wifi-status").innerHTML = "Erreur connexion";
        }
      }

      /* État réseau */
      function updateWifi() {
        fetch("/api/wifi")
          .then((r) => r.json())
          .then((data) => {
            ip_sta.innerText = data.ip_sta;
            ip_ap.innerText = data.ip_ap;
            rssi_val.innerText = data.rssi + " dBm";
            chan.innerText = data.chan;
            clients_count.innerText = data.clients;
            mac.innerText = data.mac;
            auth.innerText = data.auth;

            let q = "Excellent";
            let color = "#00cc66";

            if (data.rssi < -85) {
              q = "Très faible";
              color = "#ff4444";
            } else if (data.rssi < -75) {
              q = "Faible";
              color = "#ffaa00";
            } else if (data.rssi < -60) {
              q = "Moyen";
              color = "orange";
            }

            quality.innerText = q;
            quality.style.color = color;
          });
      }

      /* INIT */
      loadWifiConfig();
      updateWifi();
      setInterval(updateWifi, 5000);
    </script>
    <script src="index.js"></script>
  </body>
</html>
