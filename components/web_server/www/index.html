<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="common.css" />
    <title>Thermostat</title>

    <style>
      body {
        background: #121212;
        color: #fff;
      }

      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 15px;
      }

      .mode-btn {
        flex: 1;
        min-width: 120px;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #252526;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      .mode-btn.active {
        background: var(--orange);
        border-color: var(--orange);
      }

      .temp-value {
        font-size: 64px;
        text-align: center;
        color: var(--orange);
        font-weight: bold;
      }

      .temp-label {
        text-align: center;
        color: #888;
      }

      .line-status {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #333;
      }

      .relay-on {
        color: #4caf50;
        font-weight: bold;
      }
      .relay-off {
        color: #ff5252;
        font-weight: bold;
      }

      .slider-container {
        margin-top: 20px;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--orange);
      }

      .setpoint {
        text-align: center;
        font-size: 24px;
        margin-top: 10px;
        color: var(--orange);
      }
    </style>
  </head>

  <body>
    <div id="navbar"></div>

    <h1 class="page-title">Thermostat</h1>

    <div class="box">
      <h2>État</h2>

      <div class="temp-label">Température</div>
      <div class="temp-value" id="temp">--.- °C</div>

      <div class="line-status">
        <span>Relais</span>
        <span id="relay" class="relay-off">OFF</span>
      </div>

      <div class="line-status">
        <span>Mode</span>
        <span id="mode">--</span>
      </div>
    </div>

    <div class="box">
      <h2>Modes</h2>

      <div class="controls">
        <button class="mode-btn" id="btn-AUTO" onclick="setMode('AUTO')">
          AUTO
        </button>

        <button class="mode-btn" id="btn-MANUAL" onclick="setMode('MANUAL')">
          MANU
        </button>

        <button class="mode-btn" id="btn-ABSENT" onclick="setMode('ABSENT')">
          ABSENT
        </button>

        <button
          class="mode-btn"
          id="btn-HORS_GEL"
          onclick="setMode('HORS_GEL')"
        >
          HORS-GEL
        </button>
      </div>

      <div class="slider-container">
        <div class="temp-label">Consigne</div>

        <input type="range" id="slider" min="5" max="30" step="0.5" />

        <div class="setpoint" id="sp">--.- °C</div>
      </div>
    </div>

    <script>
      const slider = document.getElementById("slider");

      slider.addEventListener("input", () => {
        document.getElementById("sp").textContent =
          parseFloat(slider.value).toFixed(1) + " °C";
      });

      slider.addEventListener("change", async () => {
        await fetch("/api/index/cmd", {
          method: "POST",
          body: "SET:" + slider.value,
        });
      });

      async function setMode(mode) {
        await fetch("/api/index/cmd", {
          method: "POST",
          body: mode,
        });

        updateButtons(mode);
      }

      function updateButtons(mode) {
        document
          .querySelectorAll(".mode-btn")
          .forEach((b) => b.classList.remove("active"));

        const btn = document.getElementById("btn-" + mode);
        if (btn) btn.classList.add("active");
      }

      function normalizeMode(m) {
        switch (m) {
          case 0:
          case "0":
          case "AUTO":
            return "AUTO";

          case 1:
          case "1":
          case "MANUAL":
            return "MANUAL";

          case 2:
          case "2":
          case "ABSENT":
            return "ABSENT";

          case 3:
          case "3":
          case "HORS_GEL":
            return "HORS_GEL";

          default:
            return "AUTO";
        }
      }

      function formatMode(m) {
        switch (normalizeMode(m)) {
          case "AUTO":
            return "AUTO";
          case "MANUAL":
            return "MANU";
          case "ABSENT":
            return "ABSENT";
          case "HORS_GEL":
            return "HORS-GEL";
          default:
            return m;
        }
      }

      async function refresh() {
        const r = await fetch("/api/index/status");
        const d = await r.json();

        document.getElementById("temp").textContent =
          d.temperature.toFixed(1) + " °C";

        const modeNorm = normalizeMode(d.mode);

        document.getElementById("mode").textContent = formatMode(d.mode);

        const relay = document.getElementById("relay");

        if (d.relay) {
          relay.textContent = "ON";
          relay.className = "relay-on";
        } else {
          relay.textContent = "OFF";
          relay.className = "relay-off";
        }

        if (d.target !== undefined) {
          slider.value = d.target;
          document.getElementById("sp").textContent =
            d.target.toFixed(1) + " °C";
        }

        updateButtons(modeNorm);
      }

      setInterval(refresh, 2000);
      refresh();
    </script>

    <script src="index.js"></script>
  </body>
</html>
