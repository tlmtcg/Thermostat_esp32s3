<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="common.css" />
    <title>Modèle Thermique 2R2C</title>

    <style>
      .value-big {
        font-size: 1.6rem;
        font-weight: bold;
        color: var(--orange);
      }
      .section-title {
        margin-top: 20px;
        font-size: 1.4rem;
        color: var(--blue);
      }
      .line {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
      }
    </style>
  </head>

  <body>
    <div id="navbar"></div>

    <h1 class="page-title">Modèle Thermique (2R2C)</h1>

    <!-- Zone de contrôle -->
    <div class="box">
      <h2>Contrôles</h2>
      <div class="controls">
        <button onclick="fetchPrediction()">Rafraîchir</button>
        <button class="secondary" id="btn-auto" onclick="toggleAutoRefresh()">
          Auto: ON
        </button>
      </div>
    </div>

    <!-- Résultats -->
    <div class="box">

      <div class="line">
        <span class="label">Dernière mise à jour</span>
        <span id="status" class="value">--</span>
      </div>

      <h2 class="section-title">Températures</h2>
      <div class="line">
        <span class="label">Ta (air)</span>
        <span id="ta" class="value-big">--</span>
      </div>
      <div class="line">
        <span class="label">Tm (murs)</span>
        <span id="tm" class="value-big">--</span>
      </div>

      <h2 class="section-title">Paramètres du modèle</h2>
      <div class="line"><span class="label">Ra</span><span id="ra">--</span></div>
      <div class="line"><span class="label">Rm</span><span id="rm">--</span></div>
      <div class="line"><span class="label">Ca</span><span id="ca">--</span></div>
      <div class="line"><span class="label">Cm</span><span id="cm">--</span></div>
      <div class="line"><span class="label">P</span><span id="p">--</span></div>

      <h2 class="section-title">Chauffe prédictive</h2>
      <div class="line">
        <span class="label">Temps pour atteindre la consigne</span>
        <span id="time_to_reach" class="value-big">--</span>
      </div>
      <div class="line">
        <span class="label">Allumage anticipé</span>
        <span id="start_heating_at" class="value-big">--</span>
      </div>
    </div>

    <script>
      let autoRefreshInterval = null;

      async function fetchPrediction() {
        try {
          const response = await fetch("/api/predict/status");
          const data = await response.json();

          document.getElementById("status").textContent =
            new Date().toLocaleTimeString();

          if (data.status !== "ok") return;

          // Températures
          document.getElementById("ta").textContent = data.Ta.toFixed(2);
          document.getElementById("tm").textContent = data.Tm.toFixed(2);

          // Paramètres
          document.getElementById("ra").textContent = data.Ra.toFixed(3);
          document.getElementById("rm").textContent = data.Rm.toFixed(3);
          document.getElementById("ca").textContent = data.Ca.toFixed(0);
          document.getElementById("cm").textContent = data.Cm.toFixed(0);
          document.getElementById("p").textContent  = data.P.toFixed(0);

          // Temps pour atteindre la consigne
          if (data.time_to_reach >= 0)
            document.getElementById("time_to_reach").textContent =
              (data.time_to_reach / 60).toFixed(1) + " min";
          else
            document.getElementById("time_to_reach").textContent = "--";

          // Allumage anticipé
          if (data.start_heating_at > 0) {
            const d = new Date(data.start_heating_at * 1000);
            document.getElementById("start_heating_at").textContent =
              d.toLocaleTimeString();
          } else {
            document.getElementById("start_heating_at").textContent = "--";
          }

        } catch (err) {
          console.error("Erreur API:", err);
        }
      }

      function toggleAutoRefresh() {
        const btn = document.getElementById("btn-auto");
        if (autoRefreshInterval) {
          clearInterval(autoRefreshInterval);
          autoRefreshInterval = null;
          btn.textContent = "Auto: OFF";
        } else {
          autoRefreshInterval = setInterval(fetchPrediction, 3000);
          btn.textContent = "Auto: ON";
        }
      }

      fetchPrediction();
      autoRefreshInterval = setInterval(fetchPrediction, 3000);
    </script>

    <script src="index.js"></script>
  </body>
</html>
