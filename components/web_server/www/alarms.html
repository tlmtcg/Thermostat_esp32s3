<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="common.css" />
    <title>Gestion des Alarmes</title>

    <style>
      body {
        background-color: #121212;
        color: #ffffff;
        margin: 20px;
        font-family: Arial, sans-serif;
      }

      h1 {
        color: #ffcc00;
      }

      .card {
        background: #2b2b2b;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 8px;
      }

      button {
        background: #ff4444;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: #cc0000;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        padding: 6px 0;
        border-bottom: 1px solid #444;
      }

      .timestamp {
        color: #999;
        font-size: 12px;
      }

      .badge {
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
      }

      .bg-active {
        background: #d32f2f;
        color: white;
      }

      .bg-resolved {
        background: #444;
        color: #999;
      }

      .delete-btn {
        margin-top: 5px;
        background: #ff4444;
        color: white;
        border: none;
        padding: 5px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }

      .delete-btn:hover {
        background: #cc0000;
      }
    </style>
  </head>

  <body>
    <h1>Gestion des Alarmes</h1>

    <!-- ================= ACTIVE ================= -->
    <div class="card">
      <h2>Alarmes Actives</h2>
      <ul id="active-alarms"></ul>
    </div>

    <!-- ================= HISTORY ================= -->
    <div class="card">
      <h2>Historique</h2>
      <ul id="alert-history"></ul>
    </div>

    <!-- ================= CLEAR ALL ================= -->
    <div class="card">
      <button onclick="clearAlarms()">Effacer toutes les alarmes</button>
    </div>

    <script>
      /* =========================================================
               CHARGEMENT ALARMES ACTIVES
            ========================================================= */
      async function loadActiveAlarms() {
        try {
          const res = await fetch("/api/alarms/active");

          if (!res.ok) {
            console.error("HTTP error:", res.status);
            return;
          }

          const data = await res.json();

          const list = document.getElementById("active-alarms");
          list.innerHTML = "";

          if (!Array.isArray(data) || data.length === 0) {
            list.innerHTML = "<li>Aucune alarme active</li>";
            return;
          }

          data.forEach((a) => {
            const li = document.createElement("li");

            li.innerHTML = `
        <span class="badge bg-active">ACTIVE</span>
        <strong>${a.name ?? ""}</strong>
      `;

            list.appendChild(li);
          });
        } catch (e) {
          console.error("Active alarms error:", e);
        }
      }

      /* =========================================================
               CHARGEMENT HISTORIQUE
            ========================================================= */
      /* =========================
         HISTORY
      ========================= */
      async function loadAlertHistory() {
        try {
          const res = await fetch("/api/alarms/history");
          const data = await res.json();

          const list = document.getElementById("alert-history");
          list.innerHTML = "";

          if (!Array.isArray(data) || data.length === 0) {
            list.innerHTML = "<li>Aucun historique</li>";
            return;
          }

          data.forEach((entry) => {
            const li = document.createElement("li");

            const badgeClass = entry.activated ? "bg-active" : "bg-resolved";
            const statusText = entry.activated ? "ACTIVÉE" : "RÉSOLUE";

            const time = entry.timestamp
              ? new Date(entry.timestamp * 1000).toLocaleString()
              : "—";

            /* =========================================================
               IMPORTANT:
               on garde le timestamp dans le DOM pour suppression
               ========================================================= */
            li.innerHTML = `
              <span class="badge ${badgeClass}">${statusText}</span>
              <strong>${entry.name ?? ""}</strong>
              <br>
              <span class="timestamp">${time}</span>
              <br>
            `;

            const btn = document.createElement("button");
            btn.className = "delete-btn";
            btn.textContent = "Supprimer";

            /* =========================================================
               ON UTILISE LE TIMESTAMP (ID UNIQUE)
               ========================================================= */
            btn.onclick = () => deleteAlarm(entry.timestamp);

            li.appendChild(btn);
            list.appendChild(li);
          });
        } catch (e) {
          console.error("History error:", e);
        }
      }

      /* =========================
         DELETE BY TIMESTAMP
      ========================= */
      async function deleteAlarm(timestamp) {
        const ok = confirm("Supprimer cette alarme ?");
        if (!ok) return;

        try {
          const res = await fetch(`/api/alarms/${timestamp}`, {
            method: "DELETE",
          });

          if (!res.ok) {
            alert("Erreur suppression");
            return;
          }

          loadAlertHistory();
          loadActiveAlarms();
        } catch (e) {
          console.error(e);
        }
      }

      /* =========================================================
               CLEAR ALL
            ========================================================= */
      async function clearAlarms() {
        try {
          await fetch("/api/alarms/clear", { method: "POST" });

          loadActiveAlarms();
          loadAlertHistory();
        } catch (e) {
          console.error(e);
        }
      }

      /* =========================================================
               AUTO REFRESH
            ========================================================= */
      setInterval(() => {
        loadActiveAlarms();
        loadAlertHistory();
      }, 5000);

      /* INIT */
      loadActiveAlarms();
      loadAlertHistory();
    </script>
  </body>
</html>
