<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="common.css" />
    <title>Gestionnaire Freebox</title>
  </head>
  <body>
    <div id="navbar"></div>

    <h1 class="page-title">Fichiers Freebox</h1>

    <div class="box">
      <h2>Explorateur de fichiers</h2>
      <div class="line" style="margin-bottom: 15px;">
        <button class="btn" onclick="loadFileList()">🔄 Rafraîchir la liste</button>
      </div>
      <ul id="files-list" style="list-style: none; padding: 0;">
        </ul>
    </div>

    <div class="box">
      <h2>Éditeur de contenu</h2>
      <div class="line">
        <span class="label">Fichier :</span>
        <input type="text" id="filename" placeholder="nom_du_fichier.json" style="flex: 1; margin-left: 10px;">
      </div>
      <textarea id="editor" style="width:100%; height:300px; margin-top: 15px; font-family: monospace; background: #222; color: #0f0; border: 1px solid var(--border-color); border-radius: 4px; padding: 10px;"></textarea>
      
      <div class="line" style="margin-top: 15px; justify-content: flex-end; gap: 10px;">
        <button class="btn" style="background: var(--red);" onclick="deleteFileUI()">Effacer</button>
        <button class="btn" style="background: var(--green);" onclick="saveContent()">Sauvegarder</button>
      </div>
    </div>

    <script src="index.js"></script>
    <script>
      // Au chargement, on initialise la page
      window.addEventListener('DOMContentLoaded', () => {
        // Charge le menu (fonction standard de ton projet)
        if (typeof loadNavbar === 'function') {
            loadNavbar();
        } else {
            // Fallback si loadNavbar n'est pas dans index.js
            fetch('/nav.html').then(res => res.text()).then(html => {
                document.getElementById('navbar').innerHTML = html;
            });
        }
        loadFileList();
      });

      async function loadFileList() {
        const listEl = document.getElementById('files-list');
        listEl.innerHTML = "<li>Chargement...</li>";
        
        try {
          const res = await fetch('/api/freebox/list');
          const text = await res.text();
          // On sépare par ligne et on ignore les lignes vides
          const files = text.split('\n').filter(f => f.trim() !== '');
          
          listEl.innerHTML = files.map(f => `
            <li class="line" style="border-bottom: 1px solid #333; padding: 8px 0;">
              <span class="label">${f.trim()}</span>
              <button class="btn" style="padding: 2px 10px;" onclick="loadFile('${f.trim()}')">Ouvrir</button>
            </li>
          `).join('');
        } catch (e) {
          listEl.innerHTML = "<li style='color:red'>Erreur de connexion</li>";
        }
      }

      async function loadFile(name) {
        document.getElementById('filename').value = name;
        const res = await fetch(`/api/freebox/read?file=${name}`);
        const data = await res.text();
        document.getElementById('editor').value = data;
      }

      async function saveContent() {
        const file = document.getElementById('filename').value;
        const content = document.getElementById('editor').value;
        
        if(!file) return alert("Nom de fichier manquant");

        const res = await fetch('/api/freebox/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ file: file, content: content })
        });

        if(res.ok) {
          alert('Sauvegarde réussie !');
          loadFileList();
        }
      }

      async function deleteFileUI() {
        const file = document.getElementById('filename').value.trim();
        if(!file || !confirm(`Supprimer ${file} ?`)) return;

        const res = await fetch(`/api/freebox/delete?file=${file}`, { method: 'DELETE' });
        if(res.ok) {
          document.getElementById('filename').value = "";
          document.getElementById('editor').value = "";
          loadFileList();
        }
      }
    </script>
  </body>
</html>
