<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="common.css" />
    <title>Configuration</title>
    <style>
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      .tab-btn {
        padding: 6px 12px;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        background: #333;
        color: #fff;
      }
      .tab-btn.active {
        background: var(--orange);
      }
      #tab-content .box {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="navbar"></div>

    <h1 class="page-title">Configuration</h1>

    <div class="box">
      <h2>Sections</h2>
      <div class="tabs">
        <button class="tab-btn active" data-tab="meteo">Météo</button>
        <button class="tab-btn" data-tab="thermo">Thermostat</button>
        <button class="tab-btn" data-tab="sht31">SHT31</button>
        <button class="tab-btn" data-tab="jeedom">Jeedom</button>
      </div>
    </div>

    <div id="tab-content"></div>

    <div class="box">
      <div class="line">
        <span class="label">Statut</span>
        <span id="status" class="value">--</span>
      </div>
      <button onclick="saveConfig()">💾 Sauvegarder</button>
    </div>

    <script src="config.js"></script>
    <script src="index.js"></script>
  </body>
</html>
