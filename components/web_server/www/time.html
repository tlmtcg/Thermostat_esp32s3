<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="common.css" />
    <title>Time Settings</title>
    <style>
      /* Style rapide pour les onglets */
      .tabs {
        display: flex;
        margin-bottom: 20px;
        border-bottom: 1px solid #444;
      }
      .tab {
        padding: 10px 20px;
        cursor: pointer;
        color: #888;
        border-bottom: 2px solid transparent;
      }
      .tab.active {
        color: var(--orange, #ff9800);
        border-bottom: 2px solid var(--orange, #ff9800);
        font-weight: bold;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      input[type="text"] {
        width: 100%;
        padding: 8px;
        margin: 10px 0;
        background: #222;
        border: 1px solid #444;
        color: white;
        border-radius: 4px;
      }
      button {
        background: var(--orange, #ff9800);
        border: none;
        padding: 10px;
        color: white;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
      }
      button:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="navbar"></div>
    <h1 class="page-title">Horloge Système</h1>

    <!-- Navigation par Onglets -->
    <div class="tabs">
      <div class="tab active" onclick="showTab('status')">Statut</div>
      <div class="tab" onclick="showTab('config')">Configuration</div>
    </div>

    <!-- Onglet 1: Statut -->
    <div id="status" class="tab-content active">
      <div class="box">
        <h2>Temps Réel</h2>
        <div class="line">
          <span class="label">Heure France</span>
          <span id="current-time" class="value hms">--:--:--</span>
        </div>
        <div class="line">
          <span class="label">Statut NTP</span>
          <span id="ntp-status" class="value ok">Connecté</span>
        </div>
      </div>

      <div class="box">
        <h2>Système</h2>
        <div class="line">
          <span class="label">Uptime</span>
          <span id="uptime_human" class="value" style="color: var(--orange)"
            >--</span
          >
        </div>
        <div class="line">
          <span class="label">Total secondes</span>
          <span
            id="uptime_raw"
            class="value"
            style="font-size: 0.8rem; opacity: 0.5"
            >--</span
          >
        </div>
      </div>

      <div class="box">
        <h2>Synchronisation NTP</h2>
        <div class="line">
          <span class="label">Dernière synchro</span>
          <span id="last_sync" class="value">--</span>
        </div>
        <div class="line">
          <span class="label">Serveur Actuel</span>
          <span id="current-server" class="value">--</span>
        </div>
      </div>
    </div>

    <!-- Onglet 2: Configuration -->
    <div id="config" class="tab-content">
      <div class="box">
        <h2>Paramètres SNTP</h2>
        <p style="font-size: 0.9rem; opacity: 0.7">
          Choisissez un serveur suggéré ou saisissez une adresse personnalisée.
        </p>

        <div
          class="line"
          style="flex-direction: column; align-items: flex-start"
        >
          <label
            for="ntp-input"
            style="font-size: 0.8rem; margin-bottom: 5px; opacity: 0.6"
            >Adresse du serveur :</label
          >
          <input
            type="text"
            id="ntp-input"
            list="ntp-servers"
            placeholder="ex: fr.pool.ntp.org"
          />

          <!-- Liste de suggestions -->
          <datalist id="ntp-servers">
            <option value="pool.ntp.org">
              Serveur par défaut (Pool Mondial)
            </option>
            <option value="fr.pool.ntp.org">France (Pool local)</option>
            <option value="time.google.com">Google Time</option>
            <option value="time.cloudflare.com">Cloudflare (Rapide)</option>
            <option value="ntp.obspm.fr">Observatoire de Paris</option>
          </datalist>
        </div>

        <button onclick="saveNtpConfig()" style="margin-top: 15px">
          Enregistrer & Appliquer
        </button>
        <p
          id="save-msg"
          style="margin-top: 10px; font-size: 0.8rem; text-align: center"
        ></p>
      </div>
    </div>
        <script src="index.js"></script>
        
    <script>
      // Gestion des onglets
      function showTab(tabId) {
        document
          .querySelectorAll(".tab-content")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        event.currentTarget.classList.add("active");
      }

      // Conversion secondes -> J H M S
      function formatUptime(seconds) {
        const d = Math.floor(seconds / 86400);
        const h = Math.floor((seconds % 86400) / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        return (d > 0 ? d + "j " : "") + h + "h " + m + "m " + s + "s";
      }

      // Récupération des données (GET)
      function updateData() {
        fetch("/api/time")
          .then((r) => r.json())
          .then((data) => {
            document.getElementById("current-time").innerText = data.time;
            document.getElementById("uptime_raw").innerText =
              data.uptime + " s";
            document.getElementById("uptime_human").innerText = formatUptime(
              data.uptime,
            );
            document.getElementById("current-server").innerText =
              data.ntp_server;

            if (data.last_sync > 0) {
              const date = new Date(data.last_sync * 1000);
              document.getElementById("last_sync").innerText =
                date.toLocaleTimeString("fr-FR");
            }
          })
          .catch((err) => console.error("Erreur API:", err));
      }

      // Envoi de la configuration (POST)
      function saveNtpConfig() {
        const newServer = document.getElementById("ntp-input").value;
        const msg = document.getElementById("save-msg");

        if (!newServer) return alert("Veuillez entrer une adresse");

        msg.innerText = "Envoi en cours...";
        msg.style.color = "white";

        fetch("/api/time", {
          method: "POST",
          body: newServer, // Envoi brut du texte
        })
          .then((response) => {
            if (response.ok) {
              msg.innerText = "Configuration enregistrée avec succès !";
              msg.style.color = "#4caf50";
              updateData(); // Rafraîchir l'affichage
            } else {
              throw new Error();
            }
          })
          .catch(() => {
            msg.innerText = "Erreur lors de l'enregistrement";
            msg.style.color = "#f44336";
          });
      }

      setInterval(updateData, 1000);
      updateData();
    </script>
  </body>
</html>
